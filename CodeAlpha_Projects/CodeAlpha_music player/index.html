<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groove — Music Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

  <div class="stage">
    <div class="tonearm" id="tonearm">
      <svg viewBox="0 0 90 90" fill="none">
        <circle cx="78" cy="12" r="8" fill="#3a332b" stroke="#544a3d" stroke-width="2"/>
        <line x1="78" y1="12" x2="20" y2="66" stroke="#544a3d" stroke-width="4" stroke-linecap="round"/>
        <circle cx="20" cy="66" r="4" fill="#e8871e"/>
      </svg>
    </div>
    <div class="record" id="record">
      <div class="label"></div>
    </div>
  </div>

  <div class="content">
    <div>
      <div class="eyebrow" id="nowPlayingFlag">Now Playing</div>
      <div class="title" id="trackTitle">—</div>
      <div class="artist" id="trackArtist">—</div>
    </div>

    <div class="progress-row">
      <span class="time" id="curTime">0:00</span>
      <input type="range" id="progress" min="0" max="100" value="0">
      <span class="time end" id="durTime">0:00</span>
    </div>

    <div class="controls">
      <button class="btn toggle" id="shuffleBtn" title="Shuffle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>

      <button class="btn" id="prevBtn" title="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM9.5 12l10-6v12z"/></svg>
      </button>

      <button class="btn play" id="playBtn" title="Play/Pause">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>

      <button class="btn" id="nextBtn" title="Next">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM14.5 12l-10 6V6z"/></svg>
      </button>

      <button class="btn toggle" id="repeatBtn" title="Repeat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>

    <div class="bottom-row">
      <div class="volume">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3z"/></svg>
        <input type="range" id="volume" min="0" max="100" value="70">
      </div>
      <div class="flags">
        <button class="pill active" id="autoplayBtn">Autoplay</button>
      </div>
    </div>
  </div>

  <div class="playlist" id="playlist"></div>

</div>
<script src="script.js"></script>
</body>
</html>
